description: 30 day retention policy

default_state: hot

ism_template:
  - index_patterns:
      - cust-a-main_*
    priority: 100

states:
  - name: hot
    actions: []
    transitions:
      - state_name: delete
        conditions:
          min_index_age: 30d

  - name: delete
    actions:
      - delete: {}